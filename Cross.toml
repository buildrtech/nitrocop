[target.x86_64-unknown-linux-musl]
pre-build = [
    "DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::='--force-confdef' -o Dpkg::Options::='--force-confold' musl-dev",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross",
]

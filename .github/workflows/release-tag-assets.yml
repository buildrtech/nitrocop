name: Release Tag Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish assets for (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-assets:
    name: build-${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: nitrocop-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: nitrocop-darwin-x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_name: nitrocop-linux-x86_64
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            asset_name: nitrocop-linux-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: assets-${{ matrix.target }}

      - name: Install aarch64 cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build nitrocop
        run: cargo build --release --target ${{ matrix.target }} --bin nitrocop
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '--sysroot=/usr/aarch64-linux-gnu' || '' }}

      - name: Prepare asset file
        run: |
          cp target/${{ matrix.target }}/release/nitrocop ./${{ matrix.asset_name }}
          chmod +x ./${{ matrix.asset_name }}

      - name: Upload built asset artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish-release:
    needs: build-assets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: nitrocop-*
          merge-multiple: true

      - name: Publish/Update GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ls -lah

          API="https://api.github.com/repos/${REPO}"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json")

          status=$(curl -sS -o /tmp/release.json -w "%{http_code}" "${AUTH[@]}" "$API/releases/tags/$TAG")
          if [ "$status" = "200" ]; then
            release_id=$(python3 -c 'import json;print(json.load(open("/tmp/release.json"))["id"])')
            echo "Using existing release id=$release_id for $TAG"
          elif [ "$status" = "404" ]; then
            echo "Creating release for $TAG"
            create_status=$(curl -sS -o /tmp/release-create.json -w "%{http_code}" "${AUTH[@]}" \
              -X POST "$API/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"generate_release_notes\":true}")
            cat /tmp/release-create.json
            if [ "$create_status" != "201" ]; then
              echo "Failed to create release (status=$create_status)" >&2
              exit 1
            fi
            release_id=$(python3 -c 'import json;print(json.load(open("/tmp/release-create.json"))["id"])')
          else
            echo "Unexpected status fetching release: $status" >&2
            cat /tmp/release.json >&2
            exit 1
          fi

          assets_json=$(curl -sS "${AUTH[@]}" "$API/releases/$release_id/assets")
          export ASSETS_JSON="$assets_json"

          for asset in nitrocop-darwin-arm64 nitrocop-darwin-x86_64 nitrocop-linux-arm64 nitrocop-linux-x86_64; do
            existing_id=$(python3 -c 'import json,os,sys; name=sys.argv[1]; assets=json.loads(os.environ.get("ASSETS_JSON", "[]")); print(next((str(a["id"]) for a in assets if a.get("name")==name), ""))' "$asset")

            if [ -n "${existing_id:-}" ]; then
              echo "Deleting existing asset $asset (id=$existing_id)"
              curl -sS "${AUTH[@]}" -X DELETE "$API/releases/assets/$existing_id" >/dev/null
            fi

            echo "Uploading $asset"
            upload_status=$(curl -sS -o /tmp/upload.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$asset" \
              "https://uploads.github.com/repos/${REPO}/releases/${release_id}/assets?name=${asset}")
            if [ "$upload_status" != "201" ]; then
              echo "Failed uploading $asset (status=$upload_status)" >&2
              cat /tmp/upload.json >&2
              exit 1
            fi
          done

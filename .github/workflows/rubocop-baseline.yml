name: RuboCop Baseline

permissions:
  contents: write

concurrency:
  group: rubocop-baseline
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration even if a matching baseline already exists"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Check if baseline already exists for current config hash ────
  check-baseline:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      config_hash: ${{ steps.config-hash.outputs.hash }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute config hash
        id: config-hash
        run: |
          # Hash ALL inputs that determine rubocop output:
          # - Gemfile (pins rubocop gem version)
          # - baseline_rubocop.yml (cop config)
          # - repo_excludes.json (per-repo file exclusions)
          # - rescue_parser_crashes.rb (parser crash handling)
          # - Both manifests (repo list + SHAs)
          HASH=$(cat bench/corpus/Gemfile \
                     bench/corpus/baseline_rubocop.yml \
                     bench/corpus/repo_excludes.json \
                     bench/corpus/rescue_parser_crashes.rb \
                     bench/corpus/manifest.jsonl \
                     bench/corpus/manifest_extended.jsonl \
                 2>/dev/null | sha256sum | cut -c1-16)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "Config hash: ${HASH}"

      - name: Check if baseline exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Force regeneration requested"
            exit 0
          fi
          HASH="${{ steps.config-hash.outputs.hash }}"
          if gh release view rubocop-baseline --json assets -q ".assets[].name" 2>/dev/null \
             | grep -q "rubocop-baseline-${HASH}.tar.zst"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Baseline already exists for hash ${HASH}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No baseline for hash ${HASH} — will generate"
          fi

  # ── Compute matrix (batched, 25 repos per job) ──────────────────
  compute-matrix:
    needs: [check-baseline]
    if: needs.check-baseline.outputs.exists == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate matrix
        id: matrix
        run: |
          python3 << 'PYEOF'
          import json, os, sys, hashlib

          BATCH_SIZE = 25

          repos = []
          for manifest in ['bench/corpus/manifest.jsonl', 'bench/corpus/manifest_extended.jsonl']:
              if os.path.exists(manifest):
                  with open(manifest) as f:
                      for line in f:
                          line = line.strip()
                          if line:
                              repos.append(json.loads(line))

          # Round-robin batching: spread large repos across batches
          num_batches = (len(repos) + BATCH_SIZE - 1) // BATCH_SIZE
          rr_batches = [[] for _ in range(num_batches)]
          for i, repo in enumerate(repos):
              rr_batches[i % num_batches].append(repo)

          batches = []
          for batch_idx, chunk in enumerate(rr_batches):
              if not chunk:
                  continue
              batch_repo_ids = '|'.join(sorted(r['id'] for r in chunk))
              batch_hash = hashlib.md5(batch_repo_ids.encode()).hexdigest()[:12]
              batches.append({
                  'batch_id': str(batch_idx),
                  'batch_hash': batch_hash,
                  'num_batches': str(num_batches),
              })

          print(f'{len(repos)} repos in {len(batches)} batches (batch_size={BATCH_SIZE})', file=sys.stderr)
          if len(batches) > 256:
              print(f'ERROR: {len(batches)} batches exceeds GitHub Actions matrix limit of 256. Increase BATCH_SIZE.', file=sys.stderr)
              sys.exit(1)
          matrix = {'include': batches}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'matrix={json.dumps(matrix)}\n')
          PYEOF

  # ── Run rubocop on each batch of repos ──────────────────────────
  rubocop-batch:
    needs: [check-baseline, compute-matrix]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Ruby version read from mise.toml
      - uses: ruby/setup-ruby@v1

      - name: Cache baseline bundle
        uses: actions/cache@v4
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-bundle-${{ hashFiles('bench/corpus/Gemfile') }}

      - name: Install baseline gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Compute batch repos
        id: batch-repos
        env:
          BATCH_ID: ${{ matrix.batch_id }}
          NUM_BATCHES: ${{ matrix.num_batches }}
        run: |
          python3 << 'PYEOF'
          import json, os

          batch_id = int(os.environ['BATCH_ID'])
          num_batches = int(os.environ['NUM_BATCHES'])

          repos = []
          for manifest in ['bench/corpus/manifest.jsonl', 'bench/corpus/manifest_extended.jsonl']:
              if os.path.exists(manifest):
                  with open(manifest) as f:
                      for line in f:
                          line = line.strip()
                          if line:
                              repos.append(json.loads(line))

          # Same round-robin as compute-matrix
          rr_batches = [[] for _ in range(num_batches)]
          for i, repo in enumerate(repos):
              rr_batches[i % num_batches].append(repo)

          chunk = rr_batches[batch_id] if batch_id < len(rr_batches) else []
          with open('batch_repos.json', 'w') as f:
              json.dump([{'id': r['id'], 'repo_url': r['repo_url'], 'sha': r['sha']} for r in chunk], f)
          print(f'Batch {batch_id}: {len(chunk)} repos')
          PYEOF

      - name: Run rubocop on batch
        run: |
          mkdir -p results/rubocop

          while IFS= read -r row; do
            REPO_ID=$(echo "$row" | jq -r '.id')
            REPO_URL=$(echo "$row" | jq -r '.repo_url')
            REPO_SHA=$(echo "$row" | jq -r '.sha')

            echo "::group::${REPO_ID}"

            # Clone — fetch exactly the pinned SHA at depth 1
            DEST="repos/${REPO_ID}"
            echo "Cloning ${REPO_ID} at ${REPO_SHA:0:7}..."
            git init "$DEST" --quiet || { echo "Init failed for ${REPO_ID}"; echo "::endgroup::"; continue; }
            git -C "$DEST" fetch --depth 1 "$REPO_URL" "$REPO_SHA" --quiet 2>/dev/null \
              || git -C "$DEST" fetch --depth 1 "$REPO_URL" --quiet \
              || { echo "Fetch failed for ${REPO_ID}"; rm -rf "$DEST"; echo "::endgroup::"; continue; }
            git -C "$DEST" checkout FETCH_HEAD --quiet 2>/dev/null \
              || echo "WARNING: checkout failed for ${REPO_ID}, using fetched HEAD"

            REPO_TIMEOUT=900  # 15 minutes

            # Resolve per-repo config (adds file exclusions for repos with known parser crashes)
            REPO_CONFIG=$(python3 bench/corpus/gen_repo_config.py "$REPO_ID" bench/corpus/baseline_rubocop.yml "$DEST")

            echo "=== rubocop: ${REPO_ID} ==="
            rc=0
            timeout "${REPO_TIMEOUT}" \
            env BUNDLE_GEMFILE=$PWD/bench/corpus/Gemfile \
                BUNDLE_PATH=$PWD/bench/corpus/vendor/bundle \
            bundle exec rubocop \
              --require ./bench/corpus/rescue_parser_crashes.rb \
              --config "$REPO_CONFIG" \
              --format json \
              --force-exclusion \
              --cache false \
              "$DEST" \
              > "results/rubocop/${REPO_ID}.json" 2>"results/rubocop/${REPO_ID}.err" || rc=$?

            if [ "$rc" -eq 124 ]; then
              echo "::warning::rubocop timed out after ${REPO_TIMEOUT}s for ${REPO_ID}"
            fi

            # Resolve symlink paths while repo is still on disk
            python3 bench/corpus/resolve_symlink_paths.py \
              "results/rubocop/${REPO_ID}.json" \
              2>/dev/null || true

            # Free disk space between repos
            rm -rf "$DEST"

            echo "::endgroup::"
          done < <(jq -c '.[]' batch_repos.json)

      - name: Upload rubocop results
        uses: actions/upload-artifact@v4
        with:
          name: rubocop-baseline-batch-${{ matrix.batch_id }}
          path: results/rubocop/
          retention-days: 1
          include-hidden-files: false

  # ── Collect results and upload release asset ─────────────────────
  package-baseline:
    needs: [check-baseline, rubocop-batch]
    if: ${{ !cancelled() && needs.check-baseline.outputs.exists == 'false' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download all rubocop results
        uses: actions/download-artifact@v4
        with:
          pattern: rubocop-baseline-batch-*
          path: rubocop-results/
          merge-multiple: true

      - name: Package baseline
        env:
          CONFIG_HASH: ${{ needs.check-baseline.outputs.config_hash }}
        run: |
          RESULT_COUNT=$(ls rubocop-results/*.json 2>/dev/null | wc -l)
          echo "Packaging ${RESULT_COUNT} rubocop result files"
          tar cf - -C rubocop-results . | zstd -T0 -3 > "rubocop-baseline-${CONFIG_HASH}.tar.zst"
          ls -lh "rubocop-baseline-${CONFIG_HASH}.tar.zst"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIG_HASH: ${{ needs.check-baseline.outputs.config_hash }}
        run: |
          # Create the release tag if it doesn't exist
          if ! gh release view rubocop-baseline >/dev/null 2>&1; then
            gh release create rubocop-baseline \
              --title "RuboCop Baseline Results" \
              --notes "Pre-computed RuboCop results for corpus oracle. Assets are keyed by config hash." \
              --latest=false
          fi

          # Upload the new asset (old assets remain for rollback)
          gh release upload rubocop-baseline \
            "rubocop-baseline-${CONFIG_HASH}.tar.zst" \
            --clobber

          echo "Uploaded rubocop-baseline-${CONFIG_HASH}.tar.zst"

      - name: Clean up old assets
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIG_HASH: ${{ needs.check-baseline.outputs.config_hash }}
        run: |
          # Keep only the current and one previous asset (for rollback)
          CURRENT="rubocop-baseline-${CONFIG_HASH}.tar.zst"
          OTHERS=()
          while read -r asset; do
            [ -n "$asset" ] || continue
            if [ "$asset" != "$CURRENT" ]; then
              OTHERS+=("$asset")
            fi
          done < <(gh release view rubocop-baseline --json assets -q '.assets[].name' 2>/dev/null || true)

          # Keep one previous asset, delete the rest
          for i in "${!OTHERS[@]}"; do
            if [ "$i" -ge 1 ]; then
              echo "Deleting old asset: ${OTHERS[$i]}"
              gh release delete-asset rubocop-baseline "${OTHERS[$i]}" --yes || true
            fi
          done

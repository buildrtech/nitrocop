name: Agent Cop Retry

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to retry (e.g. Style/NegatedWhile)'
        required: true
        type: string
      backend:
        description: 'Agent backend'
        type: choice
        options:
          - minimax
          - codex
        default: codex
      extra_context:
        description: 'Additional instructions (optional)'
        required: false
        type: string

jobs:
  retry:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo test --lib --no-run 2>&1

      - name: Compute identifiers
        id: cop
        run: |
          python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          cop_snake = snake(name)
          print(f'branch=fix/{dept_dir}-{cop_snake}')
          print(f'filter=cop::{dept_dir}::{cop_snake}')
          " "${{ github.event.inputs.cop }}" >> "$GITHUB_OUTPUT"

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/generate-cop-task.py \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --output /tmp/task.md

      - name: Collect prior failed attempts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/collect_prior_attempts.py \
            --cop "${{ github.event.inputs.cop }}" \
            --output /tmp/prior_attempts.md

      - name: Build retry prompt
        run: |
          cp /tmp/task.md /tmp/retry-task.md

          if [ -s /tmp/prior_attempts.md ]; then
            echo "" >> /tmp/retry-task.md
            cat /tmp/prior_attempts.md >> /tmp/retry-task.md
          fi

          if [ -n "${{ github.event.inputs.extra_context }}" ]; then
            echo "" >> /tmp/retry-task.md
            echo "## Additional Instructions" >> /tmp/retry-task.md
            echo "${{ github.event.inputs.extra_context }}" >> /tmp/retry-task.md
          fi

          echo "" >> /tmp/retry-task.md
          echo "**CRITICAL:** Do NOT repeat approaches that already failed. Read the prior attempts carefully and try a DIFFERENT strategy." >> /tmp/retry-task.md
          wc -l /tmp/retry-task.md

      - name: Close prior open PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COP="${{ github.event.inputs.cop }}"
          OPEN_PRS=$(gh pr list --state open --search "$COP in:title" --json number --jq '.[].number' 2>/dev/null || true)
          for pr in $OPEN_PRS; do
            echo "Closing stale PR #$pr"
            gh pr close "$pr" --comment "Superseded by retry attempt." 2>/dev/null || true
          done

      - name: Install agent CLI
        run: |
          if [ "${{ github.event.inputs.backend }}" = "minimax" ]; then
            curl -fsSL https://claude.ai/install.sh | bash
          else
            npm install -g @openai/codex@latest
          fi

      - name: Prepare clean workspace for agent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "main_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git rm -r --quiet \
            CLAUDE.md AGENTS.md \
            .claude/ .agents/ .devcontainer/ .github/ gem/ scripts/ \
            2>/dev/null || true
          git commit -m "tmp: clean workspace for agent"
        id: prep

      - name: Run agent
        env:
          ANTHROPIC_BASE_URL: ${{ github.event.inputs.backend == 'minimax' && 'https://api.minimax.io/anthropic' || '' }}
          ANTHROPIC_AUTH_TOKEN: ${{ github.event.inputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_MODEL: ${{ github.event.inputs.backend == 'minimax' && 'MiniMax-M2.7' || '' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ github.event.inputs.backend == 'minimax' && 'MiniMax-M2.7' || '' }}
          API_TIMEOUT_MS: "300000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CODEX_AUTH_JSON: ${{ github.event.inputs.backend == 'codex' && secrets.CODEX_AUTH_JSON || '' }}
        run: |
          if [ "${{ github.event.inputs.backend }}" = "minimax" ]; then
            claude -p --dangerously-skip-permissions "$(cat /tmp/retry-task.md)"
          else
            mkdir -p ~/.codex
            echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json
            codex exec --full-auto -m gpt-5.4 - < /tmp/retry-task.md
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.cop.outputs.branch }}"
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ github.event.inputs.backend }}"

          git add -A
          git commit -m "agent changes" --allow-empty

          git diff "${{ steps.prep.outputs.main_sha }}" HEAD -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > /tmp/agent.patch

          git checkout main

          if [ -s /tmp/agent.patch ]; then
            git apply /tmp/agent.patch

            cargo test --lib --no-run 2>&1
            cargo test --lib -- "${{ steps.cop.outputs.filter }}" 2>&1

            git push origin --delete "$BRANCH" 2>/dev/null || true
            git checkout -b "$BRANCH"
            git add src/cop/ tests/fixtures/cops/ bench/corpus/
            git commit -m "Fix ${COP}: agent-generated fix (retry, $BACKEND)"

            git push -u origin "$BRANCH"

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Fix ${COP}: agent-generated fix (retry)" \
              --body "Retry fix for ${COP} (backend: ${BACKEND}). Prior attempts reviewed."
          else
            echo "No cop file changes found in agent output"
          fi
